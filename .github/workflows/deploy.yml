name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main # Triggers the workflow when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository so the workflow can access it
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Step 3: Install Dependencies
      - name: Install Dependencies
        run: npm install

      # Step 4: Build the production bundle
      # This compiles all TSX, optimizes CSS, and copies public/ configurations (.htaccess, sitemap, etc.) into the "dist" folder
      - name: 🏗️ Build Application
        run: npm run build

      # Step 5: Sync files to Hostinger FTP Server
      # Using the industry-standard high-performance FTP deployment action
      - name: 🚀 Sync Files to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/         # We deploy the optimized web assets folder
          
          # =======================================================================================
          # DETECT YOUR FTP TARGET DIRECTORY (Choose Option A or Option B based on your FTP account setup)
          #
          # OPTION A: If your FTP account is the "Main" administrator account (displays "domains" folder when logging in)
          # server-dir: domains/mysticapeconcepts.com/public_html/
          #
          # OPTION B: If your FTP account was created specifically for this domain and is scoped directly to "public_html"
          # server-dir: ./
          # =======================================================================================
          server-dir: domains/mysticapeconcepts.com/public_html/
          
          protocol: ftp              # Standard Hostinger FTP protocol
          port: 21                   # Default FTP port
