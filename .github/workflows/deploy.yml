name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main # Triggers the workflow when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository so the workflow can access it
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: 🛠️ Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Clean install dependencies
      - name: 📦 Install Dependencies
        run: npm ci

      # Step 4: Build the production bundle
      # This compiles all TSX, optimizes CSS, and copies public/ configurations (.htaccess, sitemap, etc.) into the "dist" folder
      - name: 🏗️ Build Application
        run: npm run build

      # Step 5: Sync files to Hostinger FTP Server
      # Using the industry-standard high-performance FTP deployment action
      - name: 🚀 Sync Files to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/         # We deploy the optimized web assets folder
          server-dir: public_html/   # Deploys directly into Hostinger's main public directory
          protocol: ftp              # Standard Hostinger FTP protocol
          port: 21                   # Default FTP port
